<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;stdio.h&gt;</span><br><span class="line">#define LEN 100</span><br><span class="line">float DataInX[LEN];</span><br><span class="line">float DataInY[LEN];</span><br><span class="line">unsigned char GucDataLength;</span><br><span class="line">void push(float x, float y) &#123;</span><br><span class="line">    int i = 0;</span><br><span class="line">    if (GucDataLength &lt; LEN) &#123;</span><br><span class="line">        DataInX[GucDataLength] = x;</span><br><span class="line">        DataInY[GucDataLength++] = y;</span><br><span class="line">        return;</span><br><span class="line">    &#125;</span><br><span class="line">    // 数据移动,去掉最后一个数据</span><br><span class="line">    for (i = 0; i &lt; LEN - 1; i++) &#123;</span><br><span class="line">        DataInX[i] = DataInX[i + 1];</span><br><span class="line">        DataInY[i] = DataInY[i + 1];</span><br><span class="line">    &#125;</span><br><span class="line">    DataInY[LEN] = x;</span><br><span class="line">    DataInY[LEN] = y;</span><br><span class="line">    GucDataLength = LEN;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">float calc(float x) &#123;</span><br><span class="line">    int i = 0;</span><br><span class="line">    float mean_x = 0;</span><br><span class="line">    float mean_y = 0;</span><br><span class="line">    float num1 = 0;</span><br><span class="line">    float num2 = 0;</span><br><span class="line">    float a = 0;</span><br><span class="line">    float b = 0;</span><br><span class="line">    //求t,y的均值</span><br><span class="line">    for (i = 0; i &lt; GucDataLength; i++) &#123;</span><br><span class="line">        mean_x += DataInX[i];</span><br><span class="line">        mean_y += DataInY[i];</span><br><span class="line">    &#125;</span><br><span class="line">    mean_x /= GucDataLength;</span><br><span class="line">    mean_y /= GucDataLength;</span><br><span class="line">    printf(&quot;mean_x = %f,mean_y = %f\n&quot;, mean_x, mean_y);</span><br><span class="line">    for (i = 0; i &lt; GucDataLength; i++) &#123;</span><br><span class="line">        num1 += (DataInX[i] - mean_x) * (DataInY[i] - mean_y);</span><br><span class="line">        num2 += (DataInX[i] - mean_x) * (DataInX[i] - mean_x);</span><br><span class="line">    &#125;</span><br><span class="line">    a = num1 / num2;</span><br><span class="line">    b = mean_y - b * mean_x;</span><br><span class="line">    printf(&quot;a = %f,b = %f\n&quot;, a, b);</span><br><span class="line">    return (a * x + b);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">    float data_x[7] = &#123;0, 1, 2, 3, 4, 5, 6&#125;;</span><br><span class="line">    float data_y[7] = &#123;-88, 16, -20, 11, 1, 1, -60&#125;;</span><br><span class="line">    int i = 0;</span><br><span class="line">    for (i = 0; i &lt; 7; i++) &#123;</span><br><span class="line">        push(data_x[i], data_y[i]);</span><br><span class="line">    &#125;</span><br><span class="line">    /* 计算x=10时y值 */</span><br><span class="line">    printf(&quot;data_y[10] = %f\n&quot;, calc(10));</span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
